# Marks dq_starterkit as a valid starter kit for
# `php core/scripts/drupal generate-theme --starterkit dq_starterkit`.
#
# This file's presence is what makes the theme generatable.
info: {}

# Setting `ignore` REPLACES core's defaults, so they are re-stated here. The
# addition is /.gitignore: this repo's ignores are library hygiene, not site
# policy — a generated theme must be able to COMMIT presets/overrides.css (the
# user's theme_design tokens, unrecoverable once dq:cleanup removes
# config.dq.yml) and package-lock.json (reproducible site builds). The site
# template's root .gitignore covers the regenerable artifacts instead
# (node_modules, dist, .vite-dev, src/fonts).
ignore:
  - '/src/StarterKit.php'
  - '/*.starterkit.yml'
  - '/.gitignore'
